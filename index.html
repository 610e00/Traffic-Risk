<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TrafficRisk">
<meta name="theme-color" content="#ffffff">
<title>TrafficRisk</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#f5f7fa;--white:#fff;--surface:#f0f3f8;
  --border:#e4e8ef;--border2:#d0d8e4;
  --text:#1a2233;--text2:#6b7a99;--text3:#aab4c8;
  --red:#e8354a;--red2:rgba(232,53,74,0.1);--red3:rgba(232,53,74,0.06);
  --orange:#f57c00;--orange2:rgba(245,124,0,0.1);
  --green:#1db954;--green2:rgba(29,185,84,0.1);
  --blue:#1a73e8;--blue2:rgba(26,115,232,0.1);
  --shadow:0 2px 12px rgba(0,0,0,0.08);--shadow2:0 4px 24px rgba(0,0,0,0.12);
  --r:16px;--rs:10px;--font:'Noto Sans TC',sans-serif;--mono:'DM Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text)}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* TOPBAR */
#topbar{display:flex;align-items:center;justify-content:flex-end;padding:6px 14px;background:var(--white);border-bottom:1px solid var(--border);z-index:1000;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:30px;height:30px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700}
.logo-name{font-size:15px;font-weight:700;letter-spacing:-.3px}
.logo-sub{font-size:10px;color:var(--text2)}
.top-chips{display:flex;gap:6px;align-items:center}
.chip{padding:4px 10px;border-radius:20px;background:var(--surface);border:1px solid var(--border);font-size:11px;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover,.chip.active{border-color:var(--blue);color:var(--blue);background:var(--blue2)}
.chip-weather{display:flex;align-items:center;gap:4px}
.weather-dot{width:5px;height:5px;border-radius:50%;background:var(--green)}

/* CONTENT */
#content{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}
.page.active{display:flex}
#page-report.active{display:flex;flex-direction:column}

/* MAP */
#map{flex:1;z-index:1}
.leaflet-container{background:#e8ecf0!important}
.leaflet-popup-content-wrapper{background:var(--white)!important;border:none!important;border-radius:var(--r)!important;box-shadow:var(--shadow2)!important;padding:0!important}
.leaflet-popup-tip{background:var(--white)!important}
.leaflet-popup-content{margin:0!important;width:268px!important}
.leaflet-popup-close-button{color:var(--text2)!important;top:10px!important;right:10px!important}
.leaflet-control-zoom{border:none!important;box-shadow:var(--shadow)!important}
.leaflet-control-zoom a{background:var(--white)!important;color:var(--text)!important;border:1px solid var(--border)!important;border-bottom:none!important}
.leaflet-control-zoom a:last-child{border-bottom:1px solid var(--border)!important}

/* POPUP */
.pu{padding:14px}
.pu-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.pu-name{font-size:13px;font-weight:700;flex:1;line-height:1.3}
.pu-badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;margin-left:8px;flex-shrink:0}
.rh .pu-badge{background:var(--red2);color:var(--red)}
.rm .pu-badge{background:var(--orange2);color:var(--orange)}
.rl .pu-badge{background:var(--green2);color:var(--green)}
.pu-score-row{display:flex;align-items:baseline;gap:5px;margin-bottom:10px}
.pu-score{font-family:var(--mono);font-size:36px;font-weight:500}
.rh .pu-score{color:var(--red)}.rm .pu-score{color:var(--orange)}.rl .pu-score{color:var(--green)}
.pu-score-sub{font-size:11px;color:var(--text2)}
.cause-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;font-size:12px;color:var(--text2)}
.cb-bg{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.cb-fill{height:100%;border-radius:2px}
.rh .cb-fill{background:var(--red)}.rm .cb-fill{background:var(--orange)}.rl .cb-fill{background:var(--green)}
.cb-pct{font-family:var(--mono);font-size:10px;color:var(--text2);width:26px;text-align:right}
.pu-hint{margin-top:8px;padding:7px 10px;background:var(--surface);border-radius:var(--rs);font-size:11px;color:var(--text);border-left:3px solid var(--orange)}

/* MARKERS */
.mk{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:var(--mono);box-shadow:0 2px 8px rgba(0,0,0,0.2);cursor:pointer;transition:transform .15s;border:none}
.mk:hover{transform:scale(1.15)}
.mk-h{background:rgba(232,53,74,0.72);color:#fff}
.mk-m{background:rgba(245,124,0,0.72);color:#fff}
.mk-l{background:rgba(29,185,84,0.72);color:#fff}
.mk-user{background:var(--blue);color:#fff;border:3px solid white;box-shadow:0 0 0 3px rgba(26,115,232,0.3)}

/* MAP OVERLAYS */
#legend{position:absolute;top:12px;right:12px;background:var(--white);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;z-index:500;box-shadow:var(--shadow);font-size:11px}
.leg-item{display:flex;align-items:center;gap:6px;color:var(--text2);margin-bottom:4px}
.leg-item:last-child{margin-bottom:0}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
#cluster-btn{position:absolute;top:12px;left:12px;background:var(--white);border:1px solid var(--border);border-radius:var(--rs);padding:7px 12px;z-index:500;font-size:12px;cursor:pointer;color:var(--text2);box-shadow:var(--shadow);transition:all .15s}
#cluster-btn.on{border-color:var(--red);color:var(--red);background:var(--red3)}
#gps-btn{position:absolute;bottom:80px;right:12px;background:var(--white);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;z-index:500;cursor:pointer;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;font-size:18px}
#filter-bar{position:absolute;bottom:12px;left:10px;right:10px;background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;z-index:500;display:flex;gap:10px;box-shadow:var(--shadow2)}
.fb-g{flex:1}
.fb-l{font-size:9px;color:var(--text2);letter-spacing:.4px;margin-bottom:4px;text-transform:uppercase;font-weight:600}
.fb-s{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:var(--rs);padding:7px 8px;font-size:12px;font-family:var(--font);outline:none}

/* NAV PAGE */
#page-nav{background:var(--bg)}
.nav-map-wrap{flex:1;position:relative;min-height:0}
#nav-map{width:100%;height:100%}

/* VOICE ALERT BANNER */
#voice-banner{display:none;position:absolute;top:10px;left:10px;right:10px;z-index:600;background:var(--red);color:#fff;border-radius:var(--rs);padding:10px 14px;font-size:13px;font-weight:600;box-shadow:var(--shadow2);text-align:center}
#voice-banner.show{display:block}

.nav-sheet{flex-shrink:0;background:var(--white);border-top:1px solid var(--border);padding:12px 14px 10px;box-shadow:0 -4px 20px rgba(0,0,0,0.06)}
.nav-inputs{display:flex;flex-direction:column;margin-bottom:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.nav-row{display:flex;align-items:center;gap:10px;padding:10px 12px;position:relative}
.nav-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.nav-field{flex:1;background:transparent;border:none;color:var(--text);font-size:14px;font-family:var(--font);outline:none}
.nav-field::placeholder{color:var(--text3)}
.nav-gps-btn{background:none;border:none;color:var(--blue);font-size:14px;cursor:pointer;padding:2px 6px;border-radius:6px;flex-shrink:0}
.nav-gps-btn:hover{background:var(--blue2)}
.nav-divider{height:1px;background:var(--border);margin:0 12px 0 31px}

/* AUTOCOMPLETE */
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:var(--white);border:1px solid var(--border);border-radius:0 0 var(--rs) var(--rs);box-shadow:var(--shadow2);z-index:700;max-height:180px;overflow-y:auto}
.ac-item{padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);color:var(--text)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:var(--surface)}
.ac-main{font-weight:600}
.ac-sub{font-size:11px;color:var(--text2);margin-top:1px}

.nav-btns{display:flex;gap:8px;margin-bottom:8px}
.btn-fast{flex:1;padding:11px;border-radius:var(--rs);background:var(--blue);border:none;color:#fff;font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer}
.btn-safe{padding:11px 16px;border-radius:var(--rs);background:var(--green2);border:2px solid var(--green);color:var(--green);font-size:13px;font-weight:700;font-family:var(--font);cursor:pointer}
.btn-cancel{padding:11px 14px;border-radius:var(--rs);background:var(--surface);border:1px solid var(--border);color:var(--text2);font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;display:none}

#route-result{display:none;flex-direction:column;max-height:200px;overflow-y:auto}
.r-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:8px}
.r-tab{flex:1;padding:7px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;transition:all .15s}
.r-tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.r-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.rs{background:var(--surface);border-radius:var(--rs);padding:8px;text-align:center}
.rs-v{font-size:18px;font-weight:700;font-family:var(--mono)}
.rs-k{font-size:10px;color:var(--text2);margin-top:1px}
.r-note{font-size:11px;padding:7px 10px;border-radius:var(--rs);margin-bottom:6px;line-height:1.5}
.r-note-fast{background:rgba(245,124,0,0.08);color:var(--orange);border:1px solid rgba(245,124,0,0.2)}
.r-note-safe{background:var(--green2);color:var(--green);border:1px solid rgba(29,185,84,0.3)}
.hi{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border)}
.hi:last-child{border-bottom:none}
.hi-rk{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:var(--mono);flex-shrink:0}
.hi-info{flex:1}
.hi-name{font-size:12px;font-weight:600}
.hi-det{font-size:10px;color:var(--text2);margin-top:1px}
.hi-sc{font-family:var(--mono);font-size:13px;font-weight:700;flex-shrink:0}

/* REPORT PAGE */
#page-report{background:var(--bg);overflow-y:auto;padding:14px;gap:10px}
.rp-h{font-size:18px;font-weight:700;margin-bottom:2px}
.rp-s{font-size:12px;color:var(--text2);margin-bottom:2px}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px;box-shadow:var(--shadow)}
.card-h{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;font-weight:700;margin-bottom:12px}
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:12px;text-align:center;box-shadow:var(--shadow)}
.kpi-v{font-size:22px;font-weight:700;font-family:var(--mono)}
.kpi-k{font-size:10px;color:var(--text2);margin-top:2px}
.feat-item{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.feat-item:last-child{margin-bottom:0}
.feat-nm{width:100px;font-size:11px;color:var(--text2)}
.feat-bg{flex:1;height:7px;background:var(--surface);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.feat-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blue),#42a5f5)}
.feat-pct{font-family:var(--mono);font-size:11px;width:36px;text-align:right}
.period-bar{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.period-lbl{width:55px;font-size:11px;color:var(--text2)}
.period-bg{flex:1;height:10px;background:var(--surface);border-radius:5px;overflow:hidden}
.period-fill{height:100%;border-radius:5px}
.period-pct{font-family:var(--mono);font-size:11px;width:36px;text-align:right}
.near-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.near-item:last-child{border-bottom:none}
.near-info{flex:1}
.near-name{font-size:13px;font-weight:600}
.near-dist{font-size:11px;color:var(--text2);margin-top:1px}
.near-sc{font-family:var(--mono);font-size:14px;font-weight:700}
.dist-item{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.dist-name{width:60px;font-size:11px;color:var(--text2)}
.dist-bg{flex:1;height:8px;background:var(--surface);border-radius:4px;overflow:hidden}
.dist-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--red),var(--orange))}
.dist-cnt{font-family:var(--mono);font-size:11px;width:30px;text-align:right;color:var(--text2)}
.saved-route{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer}
.saved-route:last-child{border-bottom:none}
.saved-route:hover{background:var(--surface);margin:0 -14px;padding:8px 14px}
.sr-info{flex:1}
.sr-name{font-size:13px;font-weight:600}
.sr-risk{font-size:11px;color:var(--text2);margin-top:1px}
.sr-arrow{color:var(--text3);font-size:14px}

/* BOTTOM NAV */
#bnav{display:flex;background:var(--white);border-top:1px solid var(--border);padding:6px 0 max(6px,env(safe-area-inset-bottom));flex-shrink:0;z-index:1000;box-shadow:0 -1px 0 var(--border)}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:var(--font);transition:color .15s}
.bn.on{color:var(--blue)}
.bn-icon{font-size:19px;line-height:1}
.bn-lbl{font-size:9px;letter-spacing:.2px;font-weight:500}

/* MODALS */
.overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);align-items:flex-end}
.overlay.open{display:flex}
.sheet{width:100%;background:var(--white);border-radius:20px 20px 0 0;padding:16px 14px max(18px,env(safe-area-inset-bottom));border-top:1px solid var(--border)}
.sh-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
.sh-title{font-size:15px;font-weight:700;margin-bottom:14px}
.sh-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sh-opt{padding:12px;border-radius:var(--rs);background:var(--surface);border:2px solid var(--border);color:var(--text);font-size:13px;text-align:center;cursor:pointer;font-family:var(--font);font-weight:500;transition:all .15s}
.sh-opt.on{border-color:var(--blue);color:var(--blue);background:var(--blue2)}
.sh-confirm{width:100%;margin-top:10px;padding:12px;background:var(--blue);border:none;border-radius:var(--rs);color:#fff;font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer}

/* LOADING */
#loading{display:none;position:fixed;inset:0;z-index:8888;background:rgba(255,255,255,0.8);backdrop-filter:blur(4px);align-items:center;justify-content:center;flex-direction:column;gap:10px}
#loading.show{display:flex}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:12px;color:var(--text2)}

/* CLUSTER */
.cl-ring{border-radius:50%;border:2px dashed rgba(232,53,74,0.5);background:rgba(232,53,74,0.06);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:var(--mono);color:var(--red);animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(232,53,74,0.2)}60%{box-shadow:0 0 0 12px rgba(232,53,74,0)}}
</style>
</head>
<body>
<div id="app">

<div id="topbar">
  <div class="top-chips" style="width:100%;justify-content:flex-end">
    <div class="chip" id="time-chip" style="cursor:default"><span id="time-lbl">偵測中</span></div>
    <div class="chip chip-weather" style="cursor:default"><div class="weather-dot" id="weather-dot"></div><span id="weather-lbl">偵測中</span></div>
  </div>
</div>

<div id="content">

<!-- MAP PAGE -->
<div class="page active" id="page-map">
  <div id="map"></div>

  <div id="legend">
    <div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div>高風險 ≥70</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--orange)"></div>中風險 50-69</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--green)"></div>低風險 &lt;50</div>
  </div>
  <button id="gps-btn" onclick="locateUser()" title="我的位置">&#9737;</button>
  <div id="filter-bar">
    <div class="fb-g">
      <div class="fb-l">行政區</div>
      <select class="fb-s" id="dist-sel" onchange="renderMain()">
        <option value="all">全部行政區</option>
        <option value="中壢區">中壢區</option><option value="桃園區">桃園區</option>
        <option value="平鎮區">平鎮區</option><option value="八德區">八德區</option>
        <option value="龍潭區">龍潭區</option><option value="楊梅區">楊梅區</option>
        <option value="蘆竹區">蘆竹區</option><option value="大溪區">大溪區</option>
        <option value="大園區">大園區</option><option value="龜山區">龜山區</option>
        <option value="復興區">復興區</option><option value="新屋區">新屋區</option>
        <option value="觀音區">觀音區</option>
      </select>
    </div>
    <div class="fb-g">
      <div class="fb-l">顯示</div>
      <select class="fb-s" id="show-sel" onchange="renderMain()">
        <option value="all">全部風險</option>
        <option value="high">僅高風險</option>
        <option value="mid">中以上</option>
      </select>
    </div>
  </div>
</div>

<!-- NAV PAGE -->
<div class="page" id="page-nav">
  <div class="nav-map-wrap">
    <div id="nav-map"></div>
    <div id="voice-banner"></div>
  </div>
  <div class="nav-sheet">
    <div class="nav-inputs">
      <div class="nav-row" id="row-from">
        <div class="nav-dot" style="background:var(--blue)"></div>
        <input class="nav-field" id="nav-from" placeholder="出發地" autocomplete="off" >
        <button class="nav-gps-btn" onclick="useGPS()" title="使用我的位置">&#9654;</button>
      </div>
      <div class="nav-divider"></div>
      <div class="nav-row" id="row-to">
        <div class="nav-dot" style="background:var(--red)"></div>
        <input class="nav-field" id="nav-to" placeholder="目的地" autocomplete="off" >
      </div>
    </div>
    <div class="nav-btns">
      <button class="btn-fast" onclick="calcRoute('fast')">最快路線</button>
      <button class="btn-safe" onclick="calcRoute('safe')">安全路線</button>
      <button class="btn-cancel" id="btn-cancel" onclick="cancelNav()">取消</button>
    </div>
    <div id="route-result">
      <div class="r-tabs">
        <div class="r-tab on" id="tab-fast" onclick="calcRoute('fast')">最快路線</div>
        <div class="r-tab" id="tab-safe" onclick="calcRoute('safe')">安全路線</div>
      </div>
      <div id="route-body"></div>
    </div>
  </div>
</div>

<!-- REPORT PAGE -->
<div class="page" id="page-report">
  <div class="rp-h">分析報告</div>
  <div class="rp-s">桃園市路口風險統計</div>

  <div class="kpi-row">
    <div class="kpi"><div class="kpi-v" style="color:var(--red)" id="kpi-high">-</div><div class="kpi-k">高風險路口</div></div>

// ── OSRM ROUTING ─────────────────────────────────────────────────
const OSRM='https://router.project-osrm.org/route/v1/driving/';

function decode(str,precision=5){
  let i=0,lat=0,lng=0,co=[];
  const factor=Math.pow(10,precision);
  while(i<str.length){
    let b,shift=0,result=0;
    do{b=str.charCodeAt(i++)-63;result|=(b&0x1f)<<shift;shift+=5;}while(b>=0x20);
    lat+=(result&1)?~(result>>1):(result>>1);
    shift=0;result=0;
    do{b=str.charCodeAt(i++)-63;result|=(b&0x1f)<<shift;shift+=5;}while(b>=0x20);
    lng+=(result&1)?~(result>>1):(result>>1);
    co.push([lat/factor,lng/factor]);
  }
  return co;
}

function scoreRoute(coords){
  let total=0;
  NODES.forEach(n=>{
    const s=sc(n);
    if(s<50) return;
    const near=coords.some(([rlat,rlng])=>{
      const dlat=(rlat-n.lat)*111000;
      const dlng=(rlng-n.lng)*111000*Math.cos(n.lat*Math.PI/180);
      return Math.sqrt(dlat*dlat+dlng*dlng)<200;
    });
    if(near) total+=s;
  });
  return total;
}

function nodesNearRoute(coords){
  return NODES.filter(n=>{
    const s=sc(n);
    if(s<50) return false;
    return coords.some(([rlat,rlng])=>{
      const dlat=(rlat-n.lat)*111000;
      const dlng=(rlng-n.lng)*111000*Math.cos(n.lat*Math.PI/180);
      return Math.sqrt(dlat*dlat+dlng*dlng)<200;
    });
  }).sort((a,b)=>sc(b)-sc(a));
}

async function fetchRoute(pts){
  const url=`${OSRM}${pts.map(([la,ln])=>`${ln},${la}`).join(';')}?overview=full&geometries=polyline`;
  const res=await fetch(url);
  const data=await res.json();
  if(data.routes&&data.routes[0]){
    return{coords:decode(data.routes[0].geometry),duration:data.routes[0].duration,distance:data.routes[0].distance};
  }
  return null;
}

async function calcRoute(type){
  // ensure we have coords
  if(!originCoords){
    const fromVal=document.getElementById('nav-from').value.trim();
    if(!fromVal){alert('請輸入出發地');return;}
    showLoading('查詢地址座標中...');
    originCoords=await geocode(fromVal);
    hideLoading();
    if(!originCoords){alert('找不到出發地，請重新輸入');return;}
  }
  if(!destCoords){
    const toVal=document.getElementById('nav-to').value.trim();
    if(!toVal){alert('請輸入目的地');return;}
    showLoading('查詢地址座標中...');
    destCoords=await geocode(toVal);
    hideLoading();
    if(!destCoords){alert('找不到目的地，請重新輸入');return;}
  }

  initNavMap();
  setTimeout(()=>navMap.invalidateSize(),50);
  navL.forEach(l=>navMap.removeLayer(l));navL=[];
  document.getElementById('tab-fast').classList.toggle('on',type==='fast');
  document.getElementById('tab-safe').classList.toggle('on',type==='safe');
  showLoading('計算路線中...');

  try{
    let rd;
    if(type==='fast'){
      rd=await fetchRoute([[originCoords.lat,originCoords.lng],[destCoords.lat,destCoords.lng]]);
    } else {
      const wps=[
        [[originCoords.lat,originCoords.lng],[destCoords.lat,destCoords.lng]],
        [[originCoords.lat,originCoords.lng],[originCoords.lat-0.02,originCoords.lng+0.05],[destCoords.lat,destCoords.lng]],
        [[originCoords.lat,originCoords.lng],[originCoords.lat+0.02,originCoords.lng+0.03],[destCoords.lat,destCoords.lng]],
      ];
      let best=null,bestScore=Infinity;
      for(const wp of wps){
        const r=await fetchRoute(wp);
        if(r){const s=scoreRoute(r.coords);if(s<bestScore){bestScore=s;best=r;}}
      }
      rd=best;
    }
    hideLoading();
    if(!rd){alert('無法取得路線，請確認網路連線');return;}

    currentRouteType=type;
    routeCoords=rd.coords;

    const col=type==='fast'?'#1a73e8':'#1db954';
    const line=L.polyline(rd.coords,{color:col,weight:5,opacity:.85}).addTo(navMap);
    navMap.fitBounds(line.getBounds(),{padding:[50,50]});
    navL.push(line);

    // markers
    const mkA=L.divIcon({className:'',iconSize:[32,32],iconAnchor:[16,16],html:`<div style="width:32px;height:32px;border-radius:50%;background:${col};display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,0.25)">A</div>`});
    const mkB=L.divIcon({className:'',iconSize:[32,32],iconAnchor:[16,16],html:`<div style="width:32px;height:32px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,0.25)">B</div>`});
    navL.push(L.marker([originCoords.lat,originCoords.lng],{icon:mkA}).addTo(navMap));
    navL.push(L.marker([destCoords.lat,destCoords.lng],{icon:mkB}).addTo(navMap));

    // risk markers on route
    NODES.filter(n=>sc(n)>=50).forEach(n=>{
      const s=sc(n),l=lvl(s);
      const icon=L.divIcon({className:'',iconSize:[26,26],iconAnchor:[13,13],
        html:`<div class="mk mk-${l}" style="width:26px;height:26px;font-size:10px">${s}</div>`});
      navL.push(L.marker([n.lat,n.lng],{icon}).addTo(navMap).bindPopup(popup(n,s)));
    });

    // render summary
    const nearNodes=nodesNearRoute(rd.coords);
    const high=nearNodes.filter(n=>sc(n)>=70).length;
    const mid=nearNodes.filter(n=>sc(n)>=50&&sc(n)<70).length;
    const mins=Math.round(rd.duration/60);
    const km=(rd.distance/1000).toFixed(1);

    document.getElementById('route-result').style.display='flex';
    document.getElementById('btn-cancel').style.display='block';
    document.getElementById('route-body').innerHTML=`
      <div class="r-summary">
        <div class="rs"><div class="rs-v" style="color:var(--red)">${high}</div><div class="rs-k">高風險路口</div></div>
        <div class="rs"><div class="rs-v" style="color:var(--orange)">${mid}</div><div class="rs-k">中風險路口</div></div>
        <div class="rs"><div class="rs-v" style="color:var(--blue)">${mins}</div><div class="rs-k">預估分鐘</div></div>
      </div>
      <div class="r-note ${type==='fast'?'r-note-fast':'r-note-safe'}">
        ${type==='fast'?`最快路線 ${km}km，途經${high}個高風險路口，建議提高警覺`:`安全路線 ${km}km，系統從備選路線中選出累計風險最低的路線`}
      </div>
      ${nearNodes.length?`<div style="font-size:11px;color:var(--text2);font-weight:600;margin-bottom:4px">路線上的風險路口</div>`:'<div style="font-size:11px;color:var(--green);padding:6px 0">此路線無高風險路口</div>'}
      ${nearNodes.slice(0,5).map((n,i)=>{
        const s=sc(n);
        const hintKey=cW==='小雨'||cW==='大雨'?'雨天':cT;
        const hint=(n.hints||{})[hintKey]||'';
        return`<div class="hi">
          <div class="hi-rk" style="background:${s>=70?'var(--red2)':'var(--orange2)'};color:${lvlC(s)}">${i+1}</div>
          <div class="hi-info">
            <div class="hi-name">${n.name}</div>
            <div class="hi-det">${lvlLbl(s)}${hint?' · '+hint.substring(0,20):''}</div>
          </div>
          <div class="hi-sc" style="color:${lvlC(s)}">${s}</div>
        </div>`;
      }).join('')}`;

    // save route
    saveRoute(document.getElementById('nav-from').value, document.getElementById('nav-to').value, high, mid, km);

    // start GPS tracking for voice alerts
    startVoiceTracking();

  }catch(e){
    hideLoading();
    document.getElementById('route-result').style.display='flex';
    document.getElementById('route-body').innerHTML=`<div class="r-note r-note-fast" style="color:var(--text2)">無法取得路線，請確認網路連線後重試。</div>`;
  }
}

// ── VOICE NAVIGATION ─────────────────────────────────────────────
function speak(text){
  if(!synth) return;
  synth.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang='zh-TW';
  utt.rate=0.9;
  synth.speak(utt);
  const banner=document.getElementById('voice-banner');
  banner.textContent=text;
  banner.classList.add('show');
  setTimeout(()=>banner.classList.remove('show'),4000);
}

function dist2D(lat1,lng1,lat2,lng2){
  const dlat=(lat1-lat2)*111000;
  const dlng=(lng1-lng2)*111000*Math.cos(lat1*Math.PI/180);
  return Math.sqrt(dlat*dlat+dlng*dlng);
}

function checkVoiceAlerts(lat,lng){
  if(!routeCoords) return;
  const now=Date.now();
  NODES.forEach(n=>{
    const s=sc(n);
    if(s<70) return;
    const d=dist2D(lat,lng,n.lat,n.lng);
    const key=`${n.id}`;
    const last=lastVoiceAlert[key]||0;
    if(now-last<60000) return; // cooldown 60s
    if(d<300&&d>=100){
      lastVoiceAlert[key]=now;
      speak(`前方${Math.round(d)}公尺為高風險路口，請小心駕駛`);
    } else if(d<100){
      lastVoiceAlert[key+'_close']=now;
      if(now-(lastVoiceAlert[key+'_close']||0)>30000){
        speak('注意，您正在通過高風險路口，請減速慢行');
      }
    }
  });
}

function checkReroute(lat,lng){
  if(!routeCoords) return;
  const nearest=routeCoords.reduce((best,[rlat,rlng])=>{
    const d=dist2D(lat,lng,rlat,rlng);
    return d<best.d?{d,lat:rlat,lng:rlng}:best;
  },{d:Infinity});
  if(nearest.d>80){
    // user deviated from route
    speak('路線已更新，正在為您重新規劃安全路徑');
    originCoords={lat,lng};
    setTimeout(()=>calcRoute(currentRouteType||'safe'),1500);
  }
}

function startVoiceTracking(){
  if(watchId){navigator.geolocation.clearWatch(watchId);}
  if(!navigator.geolocation) return;
  watchId=navigator.geolocation.watchPosition(pos=>{
    const lat=pos.coords.latitude, lng=pos.coords.longitude;
    userLat=lat;userLng=lng;
    // update user marker on nav map
    if(navUserMarker) navMap.removeLayer(navUserMarker);
    const icon=L.divIcon({className:'',iconSize:[24,24],iconAnchor:[12,12],
      html:`<div class="mk mk-user" style="width:24px;height:24px;font-size:9px">我</div>`});
    navUserMarker=L.marker([lat,lng],{icon}).addTo(navMap);
    checkVoiceAlerts(lat,lng);
    checkReroute(lat,lng);
  },{enableHighAccuracy:true,maximumAge:5000,timeout:10000});
}

// ── SAVE ROUTES ──────────────────────────────────────────────────
function saveRoute(from,to,high,mid,km){
  const key=`${from}→${to}`;
  savedRoutes=savedRoutes.filter(r=>r.key!==key);
  savedRoutes.unshift({key,from,to,high,mid,km,time:Date.now()});
  if(savedRoutes.length>5) savedRoutes=savedRoutes.slice(0,5);
  localStorage.setItem('tr_routes',JSON.stringify(savedRoutes));
  buildSavedRoutes();
}

// ── REPORT ───────────────────────────────────────────────────────
function buildReport(){
  // KPI
  const high=NODES.filter(n=>sc(n)>=70).length;
  const mid=NODES.filter(n=>sc(n)>=50&&sc(n)<70).length;
  document.getElementById('kpi-high').textContent=high;
  document.getElementById('kpi-mid').textContent=mid;
  document.getElementById('kpi-f1').textContent=MODEL_METRICS.f1_score||'-';

  // period chart (from model features -晚峰 and 夜間 are most dangerous)
  const periods=[
    {lbl:'晚峰 17-21',pct:27.0,color:'var(--red)'},
    {lbl:'早峰 06-10',pct:26.2,color:'var(--orange)'},
    {lbl:'日間 10-17',pct:22.0,color:'#f0a000'},
    {lbl:'夜間 21-06',pct:15.7,color:'#888'},
    {lbl:'深夜 00-06',pct:9.1,color:'var(--text3)'},
  ];
  document.getElementById('period-chart').innerHTML=periods.map(p=>`
    <div class="period-bar">
      <div class="period-lbl">${p.lbl}</div>
      <div class="period-bg"><div class="period-fill" style="width:${p.pct/30*100}%;background:${p.color}"></div></div>
      <div class="period-pct">${p.pct}%</div>
    </div>`).join('');

  // district chart
  const distCounts={};
  NODES.forEach(n=>{
    if(sc(n)>=70){
      const d=n.dist||'其他';
      distCounts[d]=(distCounts[d]||0)+1;
    }
  });
  const sorted=Object.entries(distCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxCnt=Math.max(...sorted.map(([,c])=>c),1);
  document.getElementById('dist-chart').innerHTML=sorted.length?sorted.map(([d,c])=>`
    <div class="dist-item">
      <div class="dist-name">${d}</div>
      <div class="dist-bg"><div class="dist-fill" style="width:${c/maxCnt*100}%"></div></div>
      <div class="dist-cnt">${c}</div>
    </div>`).join(''):'<div style="font-size:12px;color:var(--text2)">資料載入中...</div>';

  // feature importance
  document.getElementById('feat-chart').innerHTML=(FEATS||[]).map(f=>`
    <div class="feat-item">
      <div class="feat-nm">${f.name}</div>
      <div class="feat-bg"><div class="feat-fill" style="width:${f.pct/35*100}%"></div></div>
      <div class="feat-pct">${f.pct}%</div>
    </div>`).join('');

  buildSavedRoutes();
}

function buildSavedRoutes(){
  const el=document.getElementById('saved-routes');
  if(!savedRoutes||savedRoutes.length===0){
    el.innerHTML='<div style="font-size:12px;color:var(--text2)">尚無常用路線，完成一次導航後自動記錄</div>';
    return;
  }
  el.innerHTML=savedRoutes.map(r=>`
    <div class="saved-route" onclick="loadSavedRoute('${r.from}','${r.to}')">
      <div class="sr-info">
        <div class="sr-name">${r.from} → ${r.to}</div>
        <div class="sr-risk">高風險路口 ${r.high} 個 · ${r.km}km</div>
      </div>
      <div class="sr-arrow">&#8250;</div>
    </div>`).join('');
}

function loadSavedRoute(from,to){
  document.getElementById('nav-from').value=from;
  document.getElementById('nav-to').value=to;
  originCoords=null;destCoords=null;
  goPage('nav',document.querySelectorAll('.bn')[1]);
  setTimeout(()=>calcRoute('safe'),300);
}

// ── NEARBY LIST ──────────────────────────────────────────────────
function updateNearbyList(){
  if(userLat===null) return;
  const withDist=NODES.map(n=>{
    const d=dist2D(userLat,userLng,n.lat,n.lng);
    return{...n,dist_m:Math.round(d)};
  }).filter(n=>n.dist_m<3000&&sc(n)>=50).sort((a,b)=>b.dist_m-a.dist_m||sc(b)-sc(a)).slice(0,5);

  const el=document.getElementById('near-list');
  if(!withDist.length){
    el.innerHTML='<div style="font-size:12px;color:var(--text2)">附近3公里內無中高風險路口</div>';
    return;
  }
  el.innerHTML=withDist.map(n=>{
    const s=sc(n);
    return`<div class="near-item">
      <div class="near-info">
        <div class="near-name">${n.name}</div>
        <div class="near-dist">${n.dist_m}公尺 · ${lvlLbl(s)}</div>
      </div>
      <div class="near-sc" style="color:${lvlC(s)}">${s}</div>
    </div>`;
  }).join('');
}

// ── MODALS ───────────────────────────────────────────────────────
const openModal=id=>document.getElementById(id).classList.add('open');
const closeModal=id=>document.getElementById(id).classList.remove('open');
document.querySelectorAll('.overlay').forEach(el=>el.addEventListener('click',e=>{
  if(e.target===el) el.classList.remove('open');
}));

function setW(el,w){setWeatherState(w);}
function setT(el,t,lbl){
  cT=t;
  document.getElementById('time-lbl').textContent=lbl;
}

// ── PAGE SWITCH ──────────────────────────────────────────────────
function goPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.bn').forEach(b=>b.classList.remove('on'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('on');
  if(name==='map'){setTimeout(()=>mainMap.invalidateSize(),50);updateNearbyList();}
  if(name==='nav'){initNavMap();setTimeout(()=>navMap.invalidateSize(),50);}
  if(name==='report'){buildReport();}
}

// ── LOADING ──────────────────────────────────────────────────────
function showLoading(txt='載入中...'){
  document.getElementById('loading-txt').textContent=txt;
  document.getElementById('loading').classList.add('show');
}
function hideLoading(){document.getElementById('loading').classList.remove('show');}

// ── PWA ──────────────────────────────────────────────────────────
const mf={name:'TrafficRisk',short_name:'TrafficRisk',start_url:'.',display:'standalone',background_color:'#ffffff',theme_color:'#ffffff'};
const bl=new Blob([JSON.stringify(mf)],{type:'application/json'});
const lk=document.createElement('link');lk.rel='manifest';lk.href=URL.createObjectURL(bl);document.head.appendChild(lk);

// ── INIT ─────────────────────────────────────────────────────────
window.addEventListener('load',async()=>{
  showLoading('載入風險資料中...');
  await loadData();
  hideLoading();
  initMain();
  autoDetectTime();
  fetchWeather();
  buildReport();
  // try to get user location silently
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      userLat=pos.coords.latitude;
      userLng=pos.coords.longitude;
      updateNearbyList();
    },()=>{});
  }
});
